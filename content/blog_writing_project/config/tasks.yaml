blog_writing_task:
  agent: blog_writer
  description: Based on the report on {topic}, create a well-written and structured
    blog that even a 5-year-old can understand.
  expected_output: '500 words long blog post on topic: {topic}.'
report_task:
  agent: report_generator
  description: 'Based on the input topic: {topic}, generate a detailed report including
    all the latest facts and future trends.'
  expected_output: '2000 words long report on topic: {topic}.'
